source /data/adb/modules/Linlin/config.conf

# 清空日志文件
# 清空一个或多个日志文件（将文件内容截断为 0 字节）
# 用法: clear_log <文件1> [文件2] ...
clear_log() {
    for file in "$@"; do
        if [ -f "$file" ] && [ -w "$file" ]; then
            > "$file"
            echo "已清空: $file"
        elif [ ! -f "$file" ]; then
            echo "错误: '$file' 不是普通文件或不存在" >&2
        elif [ ! -w "$file" ]; then
            echo "错误: 没有对 '$file' 的写入权限" >&2
        fi
    done
}

# 写入日志文件
log() {
    local now level msg dir
    now=$(date +"[%Y-%m-%d %H:%M:%S %Z]")
    level="$1"
    msg="$2"
    dir="$3"

    local color_reset="\033[0m"
    local color_info="\033[1;32m"
    local color_warn="\033[1;33m"
    local color_error="\033[1;31m"
    local color_default="\033[1;30m"

    local color="$color_default"

    case "$level" in
        Info)  color="$color_info" ;;
        Warn)  color="$color_warn" ;;
        Error) color="$color_error" ;;
    esac

    if [ -t 1 ]; then
        printf "%b%s [%s]: %s%b\n" \
            "$color" "$now" "$level" "$msg" "$color_reset"
    else
        printf "%s [%s]: %s\n" \
            "$now" "$level" "$msg"
    fi

    # 用 subshell + printf + \n 保证一条日志完整写入
    {
        printf "%s [%s]: %s\n" "$now" "$level" "$msg"
    } >> "$dir"
}

# 设置模块描述
set_module_prop() {
   [ -f "${module_dir}/module.prop" ] && sed -i "s/description=.*/description=$1/" "${module_dir}/module.prop"
}


# 杀死进程(命令行)
kill_by_names() {
    local pattern="$1"
    [ -z "$pattern" ] && return 1

    log Info "按命令行杀进程: $pattern" "$log_dir/run.log"

    pkill -9 -f -- "$pattern" 2>/dev/null
    log Info "命令行进程已处理完成: $pattern" "$log_dir/run.log"
}

# 杀死进程(进程名)
kill_by_name() {
    local name="$1"
    [ -z "$name" ] && return 1

    log Info "按进程名杀进程: $name" "$log_dir/run.log"

    pkill -9 -x "$name" 2>/dev/null
    log Info "进程名已处理完成: $name" "$log_dir/run.log"
}

# 检查进程是否存在
is_process_running() {
    local name="$1"
    # 优先使用 pgrep（如果可用）
    if command -v pgrep >/dev/null 2>&1; then
        pgrep -f "$name" >/dev/null 2>&1
        return $?
    fi
    # 其次使用 pidof
    if command -v pidof >/dev/null 2>&1; then
        pidof "$name" >/dev/null 2>&1
        return $?
    fi
    # 最后使用 ps 与 grep
    ps -A 2>/dev/null | grep -v grep | grep -q "$name"
    return $?
}


# 并行等待多个进程启动，只有全部成功才执行后续
parallel_wait_all() {
    local timeout="${1:-10}"
    shift

    log Info "========== 并行等待开始 ==========" ${log_dir}/run.log

    local failed=0
    local pids=""

    for svc in "$@"; do
    (
        local wait_count=0
        local pid=""

        while [ $wait_count -lt $timeout ]; do
            pid=$(pidof "$svc" 2>/dev/null | awk '{print $1}')
            [ -n "$pid" ] && break
            sleep 1
            wait_count=$((wait_count + 1))
        done

        if [ -n "$pid" ]; then
            log Info "进程 $svc 已启动 PID=$pid" ${log_dir}/run.log
            exit 0
        else
            log Warn "进程 $svc 启动超时" ${log_dir}/run.log
            exit 1
        fi
    ) &

    pids="$pids $!"
    done

    # 等待所有子任务
    for pid in $pids; do
        wait "$pid" || failed=1
    done

    if [ "$failed" -eq 0 ]; then
        log Info "所有进程启动成功，执行后续代码" ${log_dir}/run.log
        log Info "========== 并行等待结束 ==========" ${log_dir}/run.log
        return 0
    else
        log Warn "有进程启动失败，停止执行后续代码" ${log_dir}/run.log
        log Info "========== 并行等待结束 ==========" ${log_dir}/run.log
        return 1
    fi
}

# 检测FD
check_fd() {
    log Info "========== 检测开始 ==========" "$log_dir/run.log"

    pids=""

    for name in "$@"; do
    (
        pid=$(pidof "$name")

        if [ -z "$pid" ]; then
            log Info "进程 [$name] 未找到" "$log_dir/run.log"
            exit 0
        fi

        # 当前已打开的 FD 数量
        fd_count=$(ls "/proc/$pid/fd" 2>/dev/null | wc -l)

        # 获取该进程的 FD 软限制（最大可打开数量）
        fd_limit=$(grep "Max open files" "/proc/$pid/limits" 2>/dev/null | awk '{print $4}')

        if [ -z "$fd_limit" ]; then
            fd_limit="未知"
        fi

        log Info "进程 [$name]：PID=$pid，当前FD数量=$fd_count，最大FD限制=$fd_limit" "$log_dir/run.log"
    ) &

        pids="$pids $!"
    done

    for p in $pids; do
        wait "$p" 2>/dev/null
    done

    log Info "========== 检测结束 ==========" "$log_dir/run.log"
}


calc_all_fd() {

    # --------------------
    # 获取最大FD
    # --------------------
    MAX_FD=$(ulimit -Hn 2>/dev/null)
    [ -z "$MAX_FD" ] && MAX_FD=4096
    ulimit -n "${MAX_FD}" 2>/dev/null

    # --------------------
    # FD计算
    # --------------------
    RESERVED=$((MAX_FD * RESERVE / 100))
    AVAILABLE_FD=$((MAX_FD - RESERVED))
    
    # 确保 AVAILABLE_FD 为正数
    [ "$AVAILABLE_FD" -le 0 ] && AVAILABLE_FD=$((MAX_FD * 80 / 100))

    TOTAL_WEIGHT=0

    # 计算总权重：只统计启用且为纯数字权重（不含%，不含skip）
    calc_total_weight() {
        local weight=$1
        local enable=$2
        [ "$enable" != "true" ] && return
        [ "$weight" = "skip" ] && return
        
        # 检查是否包含 %
        case "$weight" in
            *%*) return ;;
        esac
        
        # 检查是否为纯数字
        case "$weight" in
            ''|*[!0-9]*) return ;;
            *) TOTAL_WEIGHT=$((TOTAL_WEIGHT + weight)) ;;
        esac
    }

    calc_total_weight "$W_APPOPT" "$enable_AppOpt"
    calc_total_weight "$W_ADGUARD" "$enable_adguardhome"
    calc_total_weight "$W_OXIDNS" "$enable_oxidns"
    calc_total_weight "$W_MIHOMO" "$enable_mihomo"
    calc_total_weight "$W_SMARTDNS" "$enable_smartdns"

    [ "$TOTAL_WEIGHT" -eq 0 ] && TOTAL_WEIGHT=1

    # --------------------
    # 分配 FD（使用 case 替代 =~）
    # --------------------
    assign_fd() {
        local weight=$1
        local enable=$2

        # 未启用 → 0
        [ "$enable" != "true" ] && echo 0 && return

        # skip → 10240
        [ "$weight" = "skip" ] && echo 10240 && return

        # 百分比 → AVAILABLE_FD * percent / 100
        case "$weight" in
            *%*)
                local percent=${weight%\%}
                case "$percent" in
                    ''|*[!0-9]*) 
                        echo 10240 
                        ;;
                    *)
                        if [ "$percent" -gt 0 ]; then
                            echo $((AVAILABLE_FD * percent / 100))
                        else
                            echo 10240
                        fi
                        ;;
                esac
                return
                ;;
        esac

        # 纯数字 → 固定FD值
        case "$weight" in
            ''|*[!0-9]*)
                echo 10240
                ;;
            *)
                if [ "$weight" -gt 0 ]; then
                    echo "$weight"
                else
                    echo 10240
                fi
                ;;
        esac
    }

    FD_ADGUARD=$(assign_fd "$W_ADGUARD" "$enable_adguardhome")
    FD_OXIDNS=$(assign_fd "$W_OXIDNS" "$enable_oxidns")
    FD_MIHOMO=$(assign_fd "$W_MIHOMO" "$enable_mihomo")
    FD_SMARTDNS=$(assign_fd "$W_SMARTDNS" "$enable_smartdns")
    FD_APPOPT=$(assign_fd "$W_APPOPT" "$enable_AppOpt")

    # 保底保护：确保所有 FD 值有效（不为空且大于0）
    case "$FD_ADGUARD" in ''|*[!0-9]*) FD_ADGUARD=10240 ;; esac
    [ "$FD_ADGUARD" -le 0 ] 2>/dev/null && FD_ADGUARD=10240
    
    case "$FD_OXIDNS" in ''|*[!0-9]*) FD_OXIDNS=10240 ;; esac
    [ "$FD_OXIDNS" -le 0 ] 2>/dev/null && FD_OXIDNS=10240
    
    case "$FD_MIHOMO" in ''|*[!0-9]*) FD_MIHOMO=10240 ;; esac
    [ "$FD_MIHOMO" -le 0 ] 2>/dev/null && FD_MIHOMO=10240
    
    case "$FD_SMARTDNS" in ''|*[!0-9]*) FD_SMARTDNS=10240 ;; esac
    [ "$FD_SMARTDNS" -le 0 ] 2>/dev/null && FD_SMARTDNS=10240
    
    case "$FD_APPOPT" in ''|*[!0-9]*) FD_APPOPT=10240 ;; esac
    [ "$FD_APPOPT" -le 0 ] 2>/dev/null && FD_APPOPT=10240

    # 日志输出
    log_msg="FD分配 ->"
    [ "${enable_AppOpt}" = "true" ] && log_msg="$log_msg AppOpt:$FD_APPOPT"
    [ "${enable_adguardhome}" = "true" ] && log_msg="$log_msg AGH:$FD_ADGUARD"
    [ "${enable_oxidns}" = "true" ] && log_msg="$log_msg Mos:$FD_OXIDNS"
    [ "${enable_mihomo}" = "true" ] && log_msg="$log_msg Mihomo:$FD_MIHOMO"
    [ "${enable_smartdns}" = "true" ] && log_msg="$log_msg Smart:$FD_SMARTDNS"
    log_msg="${log_msg} Reserved:${RESERVED}"
    log Info "${log_msg}" ${log_dir}/run.log
}


# 用法: auto_clear_logs <max_size_bytes> <log_file1> [log_file2 ...]
# 示例: auto_clear_logs 104857600 /var/log/app1.log /var/log/app2.log
auto_clear_logs() {
    # 第一个参数是大小阈值（字节）
    max_size="$1"
    shift   # 剩余参数都是日志文件路径

    # 检查阈值是否有效
    case "$max_size" in
        ''|*[!0-9]*) echo "Error: max_size must be a positive integer" >&2; return 1 ;;
    esac

    # 如果没有传入任何文件，直接返回
    [ $# -eq 0 ] && return 0

    # 遍历所有文件
    for log_file in "$@"; do
        # 跳过空或无效路径
        [ -z "$log_file" ] && continue

        if [ -f "$log_file" ]; then
            # 获取文件大小（字节），兼容 busybox 和标准 Linux
            size=$(stat -c %s "$log_file" 2>/dev/null || stat -f %z "$log_file" 2>/dev/null)
            if [ -n "$size" ] && [ "$size" -ge "$max_size" ]; then
                # 原地清空文件
                > "$log_file"
                # 可选：写入清空记录（时间戳 + 原大小）
                echo "$(date): Cleared $log_file (was ${size} bytes)" >> "$log_file"
            fi
        fi
    done
}