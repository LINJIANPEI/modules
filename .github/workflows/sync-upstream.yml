name: 同步上游 Releases

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
    inputs:
      force_update:
        description: "强制更新所有仓库"
        required: false
        type: boolean
        default: false
      upstream_name:
        description: "指定上游名称（留空则全部）"
        required: false
        type: string
        default: ""
      skip_backup:
        description: "跳过备份"
        required: false
        type: boolean
        default: false
      select_asset:
        description: "手动指定资产文件名（留空自动选择）"
        required: false
        type: string
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip wget rsync tree gzip tar

      - name: 读取配置
        id: config
        run: |
          if [ ! -f "sync-mapping-config.json" ]; then
            echo "ERROR: sync-mapping-config.json not found"
            exit 1
          fi

          UPSTREAMS_COUNT=$(jq '.upstreams | length' sync-mapping-config.json)
          echo "Config loaded, upstreams count: $UPSTREAMS_COUNT"
          echo "count=$UPSTREAMS_COUNT" >> $GITHUB_OUTPUT

      - name: 备份现有文件
        if: github.event.inputs.skip_backup != 'true' && github.event.inputs.force_update != 'true'
        run: |
          BACKUP_DIR=".backup_$(date +'%Y%m%d_%H%M%S')"
          mkdir -p "$BACKUP_DIR"

          jq -r '.upstreams[].mappings[].target' sync-mapping-config.json 2>/dev/null | while read target; do
            if [ -e "$target" ]; then
              mkdir -p "$BACKUP_DIR/$(dirname "$target")"
              cp -r "$target" "$BACKUP_DIR/$target"
              echo "Backed up: $target"
            fi
          done

          echo "$BACKUP_DIR" > .last_backup
          echo "Backup completed: $BACKUP_DIR"

          ls -dt .backup_* 2>/dev/null | tail -n +6 | xargs rm -rf 2>/dev/null || true

      - name: 同步上游
        id: sync
        run: |
          FORCE_UPDATE="${{ github.event.inputs.force_update }}"
          SPECIFIC_UPSTREAM="${{ github.event.inputs.upstream_name }}"
          MANUAL_ASSET="${{ github.event.inputs.select_asset }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            FORCE_UPDATE="false"
          fi

          select_asset() {
            local assets_json="$1"
            local patterns="$2"
            local priority="$3"
            
            if [ -n "$MANUAL_ASSET" ]; then
              echo "$assets_json" | jq -r ".[] | select(.name == \"$MANUAL_ASSET\") | .browser_download_url" 2>/dev/null
              return
            fi
            
            for keyword in $priority; do
              url=$(echo "$assets_json" | jq -r ".[] | select(.name | test(\"$keyword\"; \"i\")) | .browser_download_url" 2>/dev/null | head -1)
              if [ -n "$url" ] && [ "$url" != "null" ]; then
                echo "$url"
                return
              fi
            done
            
            for pattern in $patterns; do
              if [[ "$pattern" == !* ]]; then
                exclude_pattern="${pattern#!}"
                assets_json=$(echo "$assets_json" | jq -c "[.[] | select(.name | test(\"$exclude_pattern\"; \"i\") | not)]" 2>/dev/null)
                continue
              fi
              
              regex=$(echo "$pattern" | sed 's/\./\\./g' | sed 's/\*/.*/g' | sed 's/\?/./g')
              url=$(echo "$assets_json" | jq -r ".[] | select(.name | test(\"^$regex$\"; \"i\")) | .browser_download_url" 2>/dev/null | head -1)
              if [ -n "$url" ] && [ "$url" != "null" ]; then
                echo "$url"
                return
              fi
            done
            
            echo "$assets_json" | jq -r '.[0].browser_download_url' 2>/dev/null
          }

          extract_file() {
            local file="$1"
            local dest="$2"
            local filename=$(basename "$file")
            
            if [[ "$filename" == *.tar.gz ]] || [[ "$filename" == *.tgz ]]; then
              echo "Extracting tar.gz: $filename"
              tar -xzf "$file" -C "$dest"
              return 0
            elif [[ "$filename" == *.gz ]]; then
              echo "Extracting gz: $filename"
              local base_name="${filename%.gz}"
              gunzip -c "$file" > "$dest/$base_name"
              return 0
            elif [[ "$filename" == *.zip ]]; then
              echo "Extracting zip: $filename"
              unzip -q "$file" -d "$dest"
              return 0
            else
              echo "Unknown format, copying directly"
              cp "$file" "$dest/"
              return 0
            fi
          }

          mkdir -p temp_downloads

          UPDATED_LIST=""
          UPDATED_COUNT=0
          TOTAL_COUNT=0
          SKIP_COUNT=0
          FAIL_COUNT=0

          for row in $(jq -c '.upstreams[]' sync-mapping-config.json); do
            NAME=$(echo "$row" | jq -r '.name')
            REPO=$(echo "$row" | jq -r '.repo')
            
            if [ -n "$SPECIFIC_UPSTREAM" ] && [ "$SPECIFIC_UPSTREAM" != "$NAME" ]; then
              echo "Skip: $NAME"
              SKIP_COUNT=$((SKIP_COUNT + 1))
              continue
            fi
            
            TOTAL_COUNT=$((TOTAL_COUNT + 1))
            
            echo ""
            echo "=========================================="
            echo "Processing: $NAME"
            echo "Repo: $REPO"
            echo "=========================================="
            
            USE_LATEST=$(echo "$row" | jq -r '.use_latest')
            SPECIFIC_TAG=$(echo "$row" | jq -r '.specific_tag // ""')
            
            if [ "$USE_LATEST" = "true" ]; then
              RELEASE_URL="https://api.github.com/repos/$REPO/releases/latest"
            else
              RELEASE_URL="https://api.github.com/repos/$REPO/releases/tags/$SPECIFIC_TAG"
            fi
            
            RELEASE_DATA=$(curl -s "$RELEASE_URL")
            
            if echo "$RELEASE_DATA" | jq -e '.message' > /dev/null 2>&1; then
              ERROR_MSG=$(echo "$RELEASE_DATA" | jq -r '.message')
              echo "Failed to get release: $ERROR_MSG"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              continue
            fi
            
            LATEST_TAG=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
            RELEASE_NAME=$(echo "$RELEASE_DATA" | jq -r '.name // .tag_name')
            PUBLISHED_AT=$(echo "$RELEASE_DATA" | jq -r '.published_at')
            
            echo "Version: $LATEST_TAG"
            echo "Published: $PUBLISHED_AT"
            
            VERSION_FILE=".version_$(echo "$NAME" | sed 's/[^a-zA-Z0-9]/_/g')"
            if [ -f "$VERSION_FILE" ] && [ "$FORCE_UPDATE" != "true" ]; then
              CURRENT_VERSION=$(cat "$VERSION_FILE")
              if [ "$CURRENT_VERSION" = "$LATEST_TAG" ]; then
                echo "Already latest: $LATEST_TAG, skip"
                SKIP_COUNT=$((SKIP_COUNT + 1))
                continue
              fi
              echo "Update: $CURRENT_VERSION -> $LATEST_TAG"
            fi
            
            echo ""
            echo "Available assets:"
            ASSET_COUNT=$(echo "$RELEASE_DATA" | jq '.assets | length')
            if [ "$ASSET_COUNT" -eq 0 ]; then
              echo "No assets found, using source code"
              ZIP_URL=$(echo "$RELEASE_DATA" | jq -r '.zipball_url')
              SELECTED_NAME="source-code.zip"
            else
              echo "$RELEASE_DATA" | jq -r '.assets[] | "   - \(.name) (\(.size) bytes)"'
              
              PATTERNS=$(echo "$row" | jq -r '.asset_patterns // ["*.zip"] | join(" ")' 2>/dev/null)
              PRIORITY=$(echo "$row" | jq -r '.asset_priority // ["module", "magisk", "release", "v", "zip"] | join(" ")' 2>/dev/null)
              
              ASSETS_JSON=$(echo "$RELEASE_DATA" | jq -c '.assets')
              SELECTED_URL=$(select_asset "$ASSETS_JSON" "$PATTERNS" "$PRIORITY")
              SELECTED_NAME=$(echo "$RELEASE_DATA" | jq -r ".assets[] | select(.browser_download_url == \"$SELECTED_URL\") | .name" 2>/dev/null)
              
              if [ -z "$SELECTED_URL" ] || [ "$SELECTED_URL" = "null" ]; then
                echo "No match, using first asset"
                SELECTED_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[0].browser_download_url')
                SELECTED_NAME=$(echo "$RELEASE_DATA" | jq -r '.assets[0].name')
              fi
            fi
            
            echo ""
            echo "Selected: $SELECTED_NAME"
            echo "Downloading..."
            
            wget -q --show-progress -O "temp_downloads/${NAME}.download" "$SELECTED_URL"
            
            if [ ! -f "temp_downloads/${NAME}.download" ]; then
              echo "Download failed"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              continue
            fi
            
            EXTRACT_DIR="temp_downloads/${NAME}_extract"
            mkdir -p "$EXTRACT_DIR"
            
            extract_file "temp_downloads/${NAME}.download" "$EXTRACT_DIR"
            
            if [ $(ls -1 "$EXTRACT_DIR" | wc -l) -eq 1 ] && [ -d "$EXTRACT_DIR"/*/ ]; then
              SOURCE_BASE="$EXTRACT_DIR"/*/
            else
              SOURCE_BASE="$EXTRACT_DIR"
            fi
            
            echo "Starting file mapping..."
            MAPPING_SUCCESS=true
            
            for mapping in $(echo "$row" | jq -c '.mappings[]'); do
              SOURCE=$(echo "$mapping" | jq -r '.source')
              TARGET=$(echo "$mapping" | jq -r '.target')
              TYPE=$(echo "$mapping" | jq -r '.type')
              OVERWRITE=$(echo "$mapping" | jq -r '.overwrite // true')
              MAKE_EXEC=$(echo "$mapping" | jq -r '.make_executable // false')
              
              echo ""
              echo "Mapping: $SOURCE -> $TARGET"
              
              if [ "$OVERWRITE" = "false" ] && [ -e "$TARGET" ]; then
                echo "Target exists, skip"
                continue
              fi
              
              mkdir -p "$(dirname "$TARGET")"
              
              case "$TYPE" in
                "file")
                  if [ -f "$SOURCE_BASE/$SOURCE" ]; then
                    cp "$SOURCE_BASE/$SOURCE" "$TARGET"
                    echo "File copied"
                  elif [ -f "$EXTRACT_DIR/$SOURCE" ]; then
                    cp "$EXTRACT_DIR/$SOURCE" "$TARGET"
                    echo "File copied (from root)"
                  else
                    echo "Source not found: $SOURCE"
                    MAPPING_SUCCESS=false
                  fi
                  ;;
                
                "folder")
                  if [ -d "$SOURCE_BASE/$SOURCE" ]; then
                    if [ "$OVERWRITE" = "true" ]; then
                      rm -rf "$TARGET"
                    fi
                    mkdir -p "$TARGET"
                    cp -r "$SOURCE_BASE/$SOURCE"/* "$TARGET/" 2>/dev/null
                    echo "Folder synced"
                    
                    EXCLUDE=$(echo "$mapping" | jq -r '.exclude[]?' 2>/dev/null)
                    for pattern in $EXCLUDE; do
                      rm -rf "$TARGET/$pattern"
                      echo "Excluded: $pattern"
                    done
                  else
                    echo "Source folder not found: $SOURCE"
                    MAPPING_SUCCESS=false
                  fi
                  ;;
                
                "pattern")
                  cd "$SOURCE_BASE" 2>/dev/null
                  for file in $SOURCE; do
                    if [ -e "$file" ]; then
                      cd - > /dev/null
                      FLATTEN=$(echo "$mapping" | jq -r '.flatten // false')
                      
                      if [ "$FLATTEN" = "true" ]; then
                        if [ -f "$SOURCE_BASE/$file" ]; then
                          cp "$SOURCE_BASE/$file" "$TARGET"
                          echo "Copied: $file -> $TARGET"
                        elif [ -d "$SOURCE_BASE/$file" ]; then
                          cp -r "$SOURCE_BASE/$file"/* "$TARGET/" 2>/dev/null
                          echo "Copied folder content: $file"
                        fi
                      else
                        cp -r "$SOURCE_BASE/$file" "$TARGET/"
                        echo "Copied (preserve structure): $file"
                      fi
                      
                      cd "$SOURCE_BASE"
                    fi
                  done
                  cd - > /dev/null
                  ;;
              esac
              
              if [ "$MAKE_EXEC" = "true" ] && [ -f "$TARGET" ]; then
                chmod +x "$TARGET"
                echo "Set executable permission"
              fi
            done
            
            UPDATE_VERSION=$(echo "$row" | jq -r '.post_process.update_version // false')
            if [ "$UPDATE_VERSION" = "true" ]; then
              VERSION_FILE=$(echo "$row" | jq -r '.post_process.version_file')
              if [ -f "$VERSION_FILE" ]; then
                sed -i "s/^version=.*/version=$LATEST_TAG/" "$VERSION_FILE"
                sed -i "s/^versionCode=.*/versionCode=$(date +'%Y%m%d%H%M%S')/" "$VERSION_FILE"
                echo "Updated version: $VERSION_FILE -> $LATEST_TAG"
              fi
            fi
            
            if [ "$MAPPING_SUCCESS" = true ]; then
              echo "$LATEST_TAG" > "$VERSION_FILE"
              UPDATED_COUNT=$((UPDATED_COUNT + 1))
              UPDATED_LIST="${UPDATED_LIST}\n  OK $NAME: $LATEST_TAG"
              echo "$NAME completed"
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              UPDATED_LIST="${UPDATED_LIST}\n  WARN $NAME: partial files missing"
            fi
          done

          echo "updated_count=$UPDATED_COUNT" >> $GITHUB_OUTPUT
          echo "total_count=$TOTAL_COUNT" >> $GITHUB_OUTPUT
          echo "skip_count=$SKIP_COUNT" >> $GITHUB_OUTPUT
          echo "fail_count=$FAIL_COUNT" >> $GITHUB_OUTPUT
          echo "updated_list=$UPDATED_LIST" >> $GITHUB_OUTPUT

          rm -rf temp_downloads

          echo ""
          echo "=========================================="
          echo "Sync Summary"
          echo "Total: $TOTAL_COUNT"
          echo "Updated: $UPDATED_COUNT"
          echo "Skipped: $SKIP_COUNT"
          echo "Failed: $FAIL_COUNT"
          echo -e "$UPDATED_LIST"
          echo "=========================================="

      - name: 显示目录结构
        if: steps.sync.outputs.updated_count > 0
        run: |
          echo "Directory structure:"
          ls -laR | head -50

      - name: 提交并推送
        if: steps.sync.outputs.updated_count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --staged --quiet; then
            echo "No changes"
          else
            COMMIT_MSG="Sync upstream updates - $(date +'%Y-%m-%d %H:%M:%S')"
            git commit -m "$COMMIT_MSG"
            git push
            echo "Committed and pushed"
          fi

      - name: 创建版本标签
        if: steps.sync.outputs.updated_count > 0 && github.event_name == 'workflow_dispatch'
        run: |
          NEW_TAG="manual_sync_$(date +'%Y%m%d_%H%M%S')"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Tag created: $NEW_TAG"
