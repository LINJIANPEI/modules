name: 同步上游并打包更新

on:
  schedule:
    - cron: "0 */24 * * *"

  workflow_dispatch:
    inputs:
      force_update:
        type: boolean
        default: false
      upstream_name:
        type: string
        default: ""
      skip_backup:
        type: boolean
        default: false
      select_asset:
        type: string
        default: ""
      timezone:
        type: string
        default: "Asia/Shanghai"
      changelog:
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip wget rsync tar gzip zip

      - name: Setup timezone
        run: |
          sudo timedatectl set-timezone Asia/Shanghai

      - name: Prepare dirs
        run: |
          mkdir -p bin temp_downloads update

      - name: Validate config
        run: jq empty sync-mapping-config.json

      # =========================
      # VERSION CODE
      # =========================
      - name: Generate version
        id: version
        run: |
          if [ ! -f .version_code ]; then
            echo 100 > .version_code
          fi

          OLD=$(cat .version_code)
          NEW=$((OLD + 1))
          echo $NEW > .version_code

          echo "version_code=$NEW" >> $GITHUB_OUTPUT
          echo "version=$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "release_date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      # =========================
      # SYNC UPSTREAM
      # =========================
      - name: Sync upstream
        id: sync
        run: |
          FORCE="${{ github.event.inputs.force_update }}"
          ACTUAL=0

          LEN=$(jq '.upstreams | length' sync-mapping-config.json)

          for ((i=0;i<LEN;i++)); do
            NAME=$(jq -r ".upstreams[$i].name" sync-mapping-config.json)
            REPO=$(jq -r ".upstreams[$i].repo" sync-mapping-config.json)

            DATA=$(curl -s "https://api.github.com/repos/$REPO/releases/latest")
            TAG=$(echo "$DATA" | jq -r '.tag_name')

            FILE=".version_$NAME"

            if [ -f "$FILE" ] && [ "$FORCE" != "true" ]; then
              OLD=$(cat "$FILE")
              if [ "$OLD" = "$TAG" ]; then
                continue
              fi
            fi

            echo "$TAG" > "$FILE"

            URL=$(echo "$DATA" | jq -r '.assets[0].browser_download_url')
            NAME_FILE=$(echo "$DATA" | jq -r '.assets[0].name')

            mkdir -p temp_downloads/$NAME
            wget -q -O temp_downloads/$NAME/$NAME_FILE "$URL"

            EXTRACT=temp_downloads/$NAME/extract
            mkdir -p "$EXTRACT"

            if [[ "$NAME_FILE" == *.zip ]]; then
              unzip -q temp_downloads/$NAME/$NAME_FILE -d "$EXTRACT"
            elif [[ "$NAME_FILE" == *.tar.gz ]]; then
              tar -xzf temp_downloads/$NAME/$NAME_FILE -C "$EXTRACT"
            else
              cp temp_downloads/$NAME/$NAME_FILE "$EXTRACT/"
            fi

            SOURCE="$EXTRACT"

            MCOUNT=$(jq ".upstreams[$i].mappings | length" sync-mapping-config.json)
            CHANGED=0

            for ((m=0;m<MCOUNT;m++)); do
              SRC=$(jq -r ".upstreams[$i].mappings[$m].source" sync-mapping-config.json)
              TGT=$(jq -r ".upstreams[$i].mappings[$m].target" sync-mapping-config.json)
              TYPE=$(jq -r ".upstreams[$i].mappings[$m].type" sync-mapping-config.json)

              if [ "$TYPE" = "file" ]; then
                FILE=$(find "$SOURCE" -name "$SRC" | head -1)

                if [ -f "$FILE" ]; then
                  mkdir -p "$(dirname "$TGT")"
                  cp -f "$FILE" "$TGT"
                  CHANGED=$((CHANGED+1))
                fi
              fi
            done

            ACTUAL=$((ACTUAL + CHANGED))
          done

          echo "actual_updates=$ACTUAL" >> $GITHUB_OUTPUT

      # =========================
      # SHOULD RELEASE
      # =========================
      - name: Check release
        id: should
        run: |
          if [ "${{ steps.sync.outputs.actual_updates }}" -gt 0 ]; then
            echo "should=true" >> $GITHUB_OUTPUT
          else
            echo "should=false" >> $GITHUB_OUTPUT
          fi

      # =========================
      # UPDATE module.prop
      # =========================
      - name: Update module.prop
        if: steps.should.outputs.should == 'true'
        run: |
          sed -i "s/^version=.*/version=${{ steps.version.outputs.version }}/" module.prop
          sed -i "s/^versionCode=.*/versionCode=${{ steps.version.outputs.version_code }}/" module.prop

      # =========================
      # UPDATE JSON
      # =========================
      - name: Generate update.json
        if: steps.should.outputs.should == 'true'
        run: |
          cat > update/update.json <<EOF
{
  "version": "${{ steps.version.outputs.version }}",
  "versionCode": ${{ steps.version.outputs.version_code }},
  "zipUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version_code }}/module.zip",
  "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/main/update/changelog.md",
  "releaseDate": "${{ steps.version.outputs.release_date }}"
}
EOF

      # =========================
      # PACKAGE
      # =========================
      - name: Build package
        if: steps.should.outputs.should == 'true'
        run: |
          mkdir build
          rsync -a --exclude=".git" --exclude="temp_downloads" ./ build/
          cd build
          zip -r ../module.zip .

      # =========================
      # RELEASE (SAFE)
      # =========================
      - name: Release
        if: steps.should.outputs.should == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version_code }}
          name: v${{ steps.version.outputs.version_code }}
          files: |
            module.zip