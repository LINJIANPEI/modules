name: 同步上游并打包更新

on:
  # 1. 定时触发 - 每24小时
  schedule:
    - cron: "0 */24 * * *"

  # 2. 手动触发 - 支持各种参数
  workflow_dispatch:
    inputs:
      force_update:
        description: "强制更新所有仓库（即使版本相同也重新同步）"
        required: false
        type: boolean
        default: false
      upstream_name:
        description: "指定上游名称（留空则全部）"
        required: false
        type: string
        default: ""
      skip_backup:
        description: "跳过备份"
        required: false
        type: boolean
        default: false
      select_asset:
        description: "手动指定资产文件名（留空自动选择）"
        required: false
        type: string
        default: ""
      timezone:
        description: "时区 (默认: Asia/Shanghai)"
        required: false
        type: string
        default: "Asia/Shanghai"
      changelog:
        description: "更新日志内容 (可选)"
        required: false
        type: string
        default: ""
      reset_version_code:
        description: "重置版本号到指定值（输入数字，如: 100，留空不重置）"
        required: false
        type: string
        default: ""

  # 3. Push 触发 - 当推送到特定分支时自动触发（强制更新）
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "README.md"
      - "**.md"
      - ".gitignore"
      - "LICENSE"
      - ".github/**"

# 并发控制 - 避免多个 workflow 同时运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-and-package:
    # 添加条件避免无限循环
    if: |
      !contains(github.event.head_commit.message, '[skip-ci]') &&
      (github.event_name != 'pull_request' || github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 安装依赖工具
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip wget rsync gzip tar
          echo "✅ 依赖工具安装完成"

      - name: 设置时区
        run: |
          sudo timedatectl set-timezone ${{ github.event.inputs.timezone || 'Asia/Shanghai' }}
          echo "当前时间: $(date)"
          echo "✅ 时区设置完成"

      - name: 创建必要目录
        run: |
          mkdir -pv bin
          mkdir -pv temp_downloads
          mkdir -pv update
          echo "✅ 目录创建完成"

      - name: 读取同步配置
        id: config
        run: |
          if [ ! -f "sync-mapping-config.json" ]; then
            echo "❌ 错误: sync-mapping-config.json 配置文件不存在"
            exit 1
          fi

          if ! jq empty sync-mapping-config.json 2>/dev/null; then
            echo "❌ 错误: sync-mapping-config.json 配置文件格式无效"
            exit 1
          fi

          UPSTREAMS_COUNT=$(jq '.upstreams | length' sync-mapping-config.json)
          echo "✅ 配置文件加载成功，上游数量: $UPSTREAMS_COUNT"
          echo "count=$UPSTREAMS_COUNT" >> $GITHUB_OUTPUT

      - name: 备份现有文件
        if: github.event.inputs.skip_backup != 'true' && github.event.inputs.force_update != 'true' && github.event_name != 'schedule' && github.event_name != 'push'
        run: |
          echo "📦 开始备份现有文件..."
          BACKUP_DIR=".backup_$(date +'%Y%m%d_%H%M%S')"
          mkdir -p "$BACKUP_DIR"

          jq -r '.upstreams[].mappings[].target' sync-mapping-config.json 2>/dev/null | while read target; do
            if [ -e "$target" ]; then
              mkdir -p "$BACKUP_DIR/$(dirname "$target")"
              cp -r "$target" "$BACKUP_DIR/$target"
              echo "  ✓ 已备份: $target"
            fi
          done

          echo "$BACKUP_DIR" > .last_backup
          echo "✅ 备份完成: $BACKUP_DIR"

          # 清理旧备份，只保留最近5个
          ls -dt .backup_* 2>/dev/null | tail -n +6 | xargs rm -rf 2>/dev/null || true
          echo "🗑️ 已清理旧备份（保留最近5个）"

      - name: 同步上游 Releases
        id: sync
        run: |
          # 判断是否为 push 事件，如果是则强制启用 force_update
          if [ "${{ github.event_name }}" = "push" ]; then
            FORCE_UPDATE="true"
            echo "🔧 Push 事件触发，已自动启用强制更新"
          else
            FORCE_UPDATE="${{ github.event.inputs.force_update }}"
            if [ "${{ github.event_name }}" = "schedule" ]; then
              FORCE_UPDATE="false"
            fi
          fi

          SPECIFIC_UPSTREAM="${{ github.event.inputs.upstream_name }}"
          MANUAL_ASSET="${{ github.event.inputs.select_asset }}"

          # 保存原始目录
          ORIGINAL_DIR=$(pwd)
          echo "工作目录: $ORIGINAL_DIR"

          # 确保 bin 目录存在
          mkdir -pv bin

          UPDATED_COUNT=0      # 版本号更新的数量
          TOTAL_COUNT=0        # 处理的总数量
          SKIP_COUNT=0         # 跳过的数量
          FAIL_COUNT=0         # 失败的数量
          ACTUAL_UPDATES=0     # 实际有文件变化的更新数

          UPSTREAMS_LEN=$(jq '.upstreams | length' sync-mapping-config.json)
          echo ""
          echo "=========================================="
          echo "📡 开始同步上游 Releases"
          echo "触发方式: ${{ github.event_name }}"
          echo "强制更新: $FORCE_UPDATE"
          echo "=========================================="

          for ((i=0; i<UPSTREAMS_LEN; i++)); do
            NAME=$(jq -r ".upstreams[$i].name" sync-mapping-config.json)
            REPO=$(jq -r ".upstreams[$i].repo" sync-mapping-config.json)
            
            if [ -n "$SPECIFIC_UPSTREAM" ] && [ "$SPECIFIC_UPSTREAM" != "$NAME" ]; then
              echo "⏭️ 跳过: $NAME (未指定)"
              SKIP_COUNT=$((SKIP_COUNT + 1))
              continue
            fi
            
            TOTAL_COUNT=$((TOTAL_COUNT + 1))
            
            echo ""
            echo "=========================================="
            echo "📥 正在处理: $NAME"
            echo "仓库地址: $REPO"
            echo "=========================================="
            
            USE_LATEST=$(jq -r ".upstreams[$i].use_latest" sync-mapping-config.json)
            SPECIFIC_TAG=$(jq -r ".upstreams[$i].specific_tag // \"\"" sync-mapping-config.json)
            
            if [ "$USE_LATEST" = "true" ]; then
              RELEASE_URL="https://api.github.com/repos/$REPO/releases/latest"
              echo "获取最新版本..."
            else
              RELEASE_URL="https://api.github.com/repos/$REPO/releases/tags/$SPECIFIC_TAG"
              echo "获取指定版本: $SPECIFIC_TAG"
            fi
            
            RELEASE_DATA=$(curl -s "$RELEASE_URL")
            
            if echo "$RELEASE_DATA" | jq -e '.message' > /dev/null 2>&1; then
              ERROR_MSG=$(echo "$RELEASE_DATA" | jq -r '.message')
              echo "❌ 获取版本信息失败: $ERROR_MSG"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              continue
            fi
            
            LATEST_TAG=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
            echo "✓ 当前版本: $LATEST_TAG"
            
            VERSION_FILE=".version_$(echo "$NAME" | sed 's/[^a-zA-Z0-9]/_/g')"
            HAS_UPDATE=false
            
            if [ -f "$VERSION_FILE" ] && [ "$FORCE_UPDATE" != "true" ]; then
              CURRENT_VERSION=$(cat "$VERSION_FILE")
              if [ "$CURRENT_VERSION" = "$LATEST_TAG" ]; then
                echo "ℹ️ 已是最新版本: $LATEST_TAG，跳过处理"
                SKIP_COUNT=$((SKIP_COUNT + 1))
                continue
              fi
              echo "🔄 发现新版本: $CURRENT_VERSION -> $LATEST_TAG"
              HAS_UPDATE=true
            else
              echo "🔄 首次同步或强制更新: $LATEST_TAG"
              HAS_UPDATE=true
            fi
            
            # ========== 资产选择逻辑 ==========
            SELECTED_URL=""
            SELECTED_NAME=""
            
            echo "📦 查找匹配的资产文件..."
            
            # 1. 手动指定资产
            if [ -n "$MANUAL_ASSET" ]; then
              SELECTED_URL=$(echo "$RELEASE_DATA" | jq -r ".assets[] | select(.name == \"$MANUAL_ASSET\") | .browser_download_url" 2>/dev/null)
              SELECTED_NAME="$MANUAL_ASSET"
              echo "  📌 使用手动指定: $SELECTED_NAME"
            fi
            
            # 2. 使用 asset_patterns 匹配
            if [ -z "$SELECTED_URL" ] || [ "$SELECTED_URL" = "null" ]; then
              PATTERNS=$(jq -r ".upstreams[$i].asset_patterns // [] | join(\" \")" sync-mapping-config.json)
              for pattern in $PATTERNS; do
                regex=$(echo "$pattern" | sed 's/\./\\./g' | sed 's/\*/.*/g' | sed 's/\?/./g')
                SELECTED_URL=$(echo "$RELEASE_DATA" | jq -r ".assets[] | select(.name | test(\"^$regex$\")) | .browser_download_url" 2>/dev/null | head -1)
                if [ -n "$SELECTED_URL" ] && [ "$SELECTED_URL" != "null" ]; then
                  SELECTED_NAME=$(echo "$RELEASE_DATA" | jq -r ".assets[] | select(.browser_download_url == \"$SELECTED_URL\") | .name" 2>/dev/null)
                  echo "  🎯 匹配模式 '$pattern': $SELECTED_NAME"
                  break
                fi
              done
            fi
            
            # 3. 使用 asset_priority 匹配关键词
            if [ -z "$SELECTED_URL" ] || [ "$SELECTED_URL" = "null" ]; then
              PRIORITY=$(jq -r ".upstreams[$i].asset_priority // [] | join(\" \")" sync-mapping-config.json)
              for keyword in $PRIORITY; do
                SELECTED_URL=$(echo "$RELEASE_DATA" | jq -r ".assets[] | select(.name | test(\"$keyword\"; \"i\")) | .browser_download_url" 2>/dev/null | head -1)
                if [ -n "$SELECTED_URL" ] && [ "$SELECTED_URL" != "null" ]; then
                  SELECTED_NAME=$(echo "$RELEASE_DATA" | jq -r ".assets[] | select(.browser_download_url == \"$SELECTED_URL\") | .name" 2>/dev/null)
                  echo "  🔑 匹配关键词 '$keyword': $SELECTED_NAME"
                  break
                fi
              done
            fi
            
            # 4. 使用第一个资产
            if [ -z "$SELECTED_URL" ] || [ "$SELECTED_URL" = "null" ]; then
              SELECTED_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[0].browser_download_url')
              SELECTED_NAME=$(echo "$RELEASE_DATA" | jq -r '.assets[0].name')
              echo "  📄 使用默认第一个资产: $SELECTED_NAME"
            fi
            
            echo "⬇️ 开始下载: $SELECTED_NAME"
            
            wget -q -O "temp_downloads/${SELECTED_NAME}" "$SELECTED_URL"
            
            DOWNLOAD_FILE="temp_downloads/${SELECTED_NAME}"
            if [ ! -f "$DOWNLOAD_FILE" ]; then
              echo "❌ 下载失败"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              continue
            fi
            echo "✓ 下载完成"
            
            EXTRACT_DIR="temp_downloads/${NAME}_extract"
            mkdir -p "$EXTRACT_DIR"
            
            # ========== 解压逻辑 ==========
            echo "📂 解压文件中..."
            if [[ "$SELECTED_NAME" == *.tar.gz ]] || [[ "$SELECTED_NAME" == *.tgz ]]; then
              tar -xzf "$DOWNLOAD_FILE" -C "$EXTRACT_DIR"
              echo "  ✓ 解压 tar.gz 完成"
            elif [[ "$SELECTED_NAME" == *.gz ]]; then
              BASE_NAME=$(basename "$SELECTED_NAME" .gz)
              gunzip -c "$DOWNLOAD_FILE" > "$EXTRACT_DIR/$BASE_NAME"
              echo "  ✓ 解压 gz 完成: $EXTRACT_DIR/$BASE_NAME"
            elif [[ "$SELECTED_NAME" == *.zip ]]; then
              unzip -q "$DOWNLOAD_FILE" -d "$EXTRACT_DIR"
              echo "  ✓ 解压 zip 完成"
            else
              # 直接下载的二进制文件
              cp "$DOWNLOAD_FILE" "$EXTRACT_DIR/$SELECTED_NAME"
              chmod +x "$EXTRACT_DIR/$SELECTED_NAME"
              echo "  ✓ 二进制文件直接复制"
            fi
            
            # 查找源目录
            if [ $(ls -1 "$EXTRACT_DIR" | wc -l) -eq 1 ] && [ -d "$EXTRACT_DIR"/*/ ]; then
              SOURCE_BASE=$(ls -d "$EXTRACT_DIR"/*/)
            else
              SOURCE_BASE="$EXTRACT_DIR"
            fi
            
            echo "📁 源目录: $SOURCE_BASE"
            
            MAPPING_SUCCESS=true
            MAPPINGS_LEN=$(jq ".upstreams[$i].mappings | length" sync-mapping-config.json)
            FILES_COPIED=0
            
            echo "📋 开始文件映射..."
            for ((m=0; m<MAPPINGS_LEN; m++)); do
              SOURCE=$(jq -r ".upstreams[$i].mappings[$m].source" sync-mapping-config.json)
              TARGET=$(jq -r ".upstreams[$i].mappings[$m].target" sync-mapping-config.json)
              TYPE=$(jq -r ".upstreams[$i].mappings[$m].type" sync-mapping-config.json)
              OVERWRITE=$(jq -r ".upstreams[$i].mappings[$m].overwrite // true" sync-mapping-config.json)
              MAKE_EXEC=$(jq -r ".upstreams[$i].mappings[$m].make_executable // false" sync-mapping-config.json)
              
              echo ""
              echo "  📍 映射: $SOURCE -> $TARGET"
              
              if [ "$OVERWRITE" = "false" ] && [ -e "$TARGET" ]; then
                echo "  ⏭️ 目标已存在且禁止覆盖，跳过"
                continue
              fi
              
              # 确保目标目录存在
              TARGET_DIR=$(dirname "$TARGET")
              mkdir -pv "$TARGET_DIR" > /dev/null 2>&1
              
              if [ "$TYPE" = "pattern" ]; then
                cd "$SOURCE_BASE"
                
                for file in $SOURCE; do
                  if [ -f "$file" ]; then
                    # 检查文件是否真的不同
                    if [ -f "$ORIGINAL_DIR/$TARGET" ]; then
                      if cmp -s "$file" "$ORIGINAL_DIR/$TARGET"; then
                        echo "  ℹ️ 文件内容相同，跳过: $file"
                        break
                      fi
                    fi
                    cp -v "$file" "$ORIGINAL_DIR/$TARGET" 2>&1 | sed 's/^/    /'
                    echo "  ✅ 已复制: $file -> $ORIGINAL_DIR/$TARGET"
                    FILES_COPIED=$((FILES_COPIED + 1))
                    break
                  fi
                done
                
                cd "$ORIGINAL_DIR"
                
              elif [ "$TYPE" = "file" ]; then
                FOUND_FILE=""
                if [ -f "$SOURCE_BASE/$SOURCE" ]; then
                  FOUND_FILE="$SOURCE_BASE/$SOURCE"
                else
                  FOUND_FILE=$(find "$SOURCE_BASE" -name "$SOURCE" -type f 2>/dev/null | head -1)
                fi
                
                if [ -n "$FOUND_FILE" ] && [ -f "$FOUND_FILE" ]; then
                  # 检查文件是否真的不同
                  if [ -f "$TARGET" ]; then
                    if cmp -s "$FOUND_FILE" "$TARGET"; then
                      echo "  ℹ️ 文件内容相同，跳过: $FOUND_FILE"
                    else
                      cp -v "$FOUND_FILE" "$TARGET" 2>&1 | sed 's/^/    /'
                      echo "  ✅ 已复制: $FOUND_FILE -> $TARGET"
                      FILES_COPIED=$((FILES_COPIED + 1))
                    fi
                  else
                    cp -v "$FOUND_FILE" "$TARGET" 2>&1 | sed 's/^/    /'
                    echo "  ✅ 已复制: $FOUND_FILE -> $TARGET"
                    FILES_COPIED=$((FILES_COPIED + 1))
                  fi
                else
                  echo "  ❌ 源文件不存在: $SOURCE"
                  MAPPING_SUCCESS=false
                fi
              fi
              
              if [ "$MAKE_EXEC" = "true" ] && [ -f "$TARGET" ]; then
                chmod +x "$TARGET"
                echo "  🔧 已设置可执行权限"
              fi
            done
            
            if [ "$MAPPING_SUCCESS" = true ]; then
              echo "$LATEST_TAG" > "$VERSION_FILE"
              UPDATED_COUNT=$((UPDATED_COUNT + 1))
              # 强制更新时也视为实际更新
              if [ $FILES_COPIED -gt 0 ] || [ "$FORCE_UPDATE" = "true" ]; then
                ACTUAL_UPDATES=$((ACTUAL_UPDATES + 1))
                echo "✅ $NAME 更新成功 (实际更新文件数: $FILES_COPIED)"
              else
                echo "⚠️ $NAME 版本已更新但无文件变化 (不触发打包)"
              fi
            else
              FAIL_COUNT=$((FAIL_COUNT + 1))
              echo "❌ $NAME 更新失败"
            fi
          done

          echo "updated_count=$UPDATED_COUNT" >> $GITHUB_OUTPUT
          echo "total_count=$TOTAL_COUNT" >> $GITHUB_OUTPUT
          echo "skip_count=$SKIP_COUNT" >> $GITHUB_OUTPUT
          echo "fail_count=$FAIL_COUNT" >> $GITHUB_OUTPUT
          echo "actual_updates=$ACTUAL_UPDATES" >> $GITHUB_OUTPUT

          rm -rf temp_downloads

          echo ""
          echo "=========================================="
          echo "📊 同步统计汇总"
          echo "=========================================="
          echo "  总计处理: $TOTAL_COUNT 个上游"
          echo "  版本更新: $UPDATED_COUNT 个"
          echo "  实际文件变化: $ACTUAL_UPDATES 个"
          echo "  跳过处理: $SKIP_COUNT 个"
          echo "  失败: $FAIL_COUNT 个"
          echo "=========================================="

      - name: 判断是否需要打包
        id: should_package
        run: |
          ACTUAL_UPDATES="${{ steps.sync.outputs.actual_updates }}"
          FORCE_UPDATE="${{ github.event.inputs.force_update }}"

          # Push 事件强制更新
          if [ "${{ github.event_name }}" = "push" ]; then
            FORCE_UPDATE="true"
          fi

          if [ "$ACTUAL_UPDATES" -gt 0 ] || [ "$FORCE_UPDATE" = "true" ]; then
            echo "should_package=true" >> $GITHUB_OUTPUT
            echo "✅ 需要打包发布"
            echo "   实际更新: $ACTUAL_UPDATES"
            echo "   强制更新: $FORCE_UPDATE"
          else
            echo "should_package=false" >> $GITHUB_OUTPUT
            echo "⏭️ 跳过打包发布"
          fi

      - name: 验证 bin 目录内容
        if: steps.should_package.outputs.should_package == 'true'
        run: |
          echo ""
          echo "📁 bin 目录内容:"
          ls -la bin/
          echo ""

      - name: 提交并推送同步更新
        if: steps.should_package.outputs.should_package == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --staged --quiet; then
            echo "📝 没有需要提交的更改"
          else
            COMMIT_MSG="同步上游更新 - $(date +'%Y-%m-%d %H:%M:%S')"
            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ 已提交并推送同步更新"
          fi

      # ========== 版本号生成（使用 .version_code 文件，支持重置）==========
      - name: 生成版本号
        if: steps.should_package.outputs.should_package == 'true'
        id: version
        run: |
          RESET_VALUE="${{ github.event.inputs.reset_version_code }}"

          echo "=========================================="
          echo "📌 版本号管理"
          echo "=========================================="

          # 处理重置请求
          if [ -n "$RESET_VALUE" ]; then
            if [[ "$RESET_VALUE" =~ ^[0-9]+$ ]]; then
              echo "🔄 重置版本号为: $RESET_VALUE"
              echo "$RESET_VALUE" > .version_code
              CURRENT_VERSION_CODE=$RESET_VALUE
            else
              echo "❌ 错误: 重置值必须是数字: '$RESET_VALUE'"
              exit 1
            fi
          else
            # 正常读取当前版本号
            if [ -f ".version_code" ]; then
              CURRENT_VERSION_CODE=$(cat .version_code)
              # 验证是否为数字
              if ! [[ "$CURRENT_VERSION_CODE" =~ ^[0-9]+$ ]]; then
                echo "⚠️ .version_code 不是有效数字，重置为 100"
                CURRENT_VERSION_CODE=100
                echo "$CURRENT_VERSION_CODE" > .version_code
              fi
            else
              echo "📄 .version_code 不存在，初始化为 100"
              CURRENT_VERSION_CODE=100
              echo "$CURRENT_VERSION_CODE" > .version_code
            fi
          fi

          # 递增版本号
          NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))

          # 保存新版本号到文件
          echo "$NEW_VERSION_CODE" > .version_code

          # 生成可读版本号
          DATE_VERSION=$(date +'%Y.%m.%d')
          VERSION="${DATE_VERSION}.${NEW_VERSION_CODE}"

          # 输出到 GitHub Actions
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$NEW_VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "release_date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "release_datetime=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

          echo ""
          echo "📊 版本信息:"
          echo "  旧版本号: $CURRENT_VERSION_CODE"
          echo "  新版本号: $NEW_VERSION_CODE"
          echo "  版本标签: v$VERSION"
          echo "  已保存到: .version_code"
          echo "=========================================="

      - name: 更新模块配置文件
        if: steps.should_package.outputs.should_package == 'true'
        run: |
          sed -i "s/^version=.*/version=${{ steps.version.outputs.version }}/" module.prop
          sed -i "s/^versionCode=.*/versionCode=${{ steps.version.outputs.versionCode }}/" module.prop
          sed -i "s|^updateJson=.*|updateJson=https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main/update/update.json|" module.prop
          echo "✅ module.prop 已更新"
          echo ""
          echo "📄 module.prop 内容:"
          cat module.prop

      - name: 更新更新日志
        if: steps.should_package.outputs.should_package == 'true'
        run: |
          mkdir -p update
          CHANGELOG_MSG="${{ github.event.inputs.changelog }}"
          if [ -z "$CHANGELOG_MSG" ]; then
            CHANGELOG_MSG="### 上游同步更新
            - 同步了上游最新 Releases
            - 更新了 ${{ steps.sync.outputs.actual_updates }} 个组件到最新版本"
          fi

          {
            echo "## [${{ steps.version.outputs.version }}] - ${{ steps.version.outputs.release_date }}"
            echo ""
            echo "$CHANGELOG_MSG"
            echo ""
            echo "### 下载"
            echo ""
            echo "- [ZIP 下载链接](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/${{ steps.version.outputs.version }}.zip)"
            echo ""
            echo "---"
            echo ""
          } >> update/changelog.new

          if [ -f "update/changelog.md" ]; then
            cat update/changelog.md >> update/changelog.new
            mv update/changelog.new update/changelog.md
          else
            echo "# 更新日志" > update/changelog.md
            echo "" >> update/changelog.md
            cat update/changelog.new >> update/changelog.md
            rm update/changelog.new
          fi

          echo "✅ 更新日志已更新"
          echo ""
          echo "📝 更新日志预览 (前30行):"
          head -30 update/changelog.md

      - name: 更新更新信息 JSON
        if: steps.should_package.outputs.should_package == 'true'
        run: |
          mkdir -p update
          cat > update/update.json <<EOF
          {
              "version": "${{ steps.version.outputs.version }}",
              "versionCode": ${{ steps.version.outputs.versionCode }},
              "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/${{ steps.version.outputs.version }}.zip",
              "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main/update/changelog.md",
              "releaseDate": "${{ steps.version.outputs.release_datetime }}"
          }
          EOF
          echo "✅ update.json 已更新"
          echo ""
          echo "📄 update.json 内容:"
          cat update/update.json

      - name: 创建 ZIP 压缩包
        if: steps.should_package.outputs.should_package == 'true'
        run: |
          echo "📦 开始打包..."
          sudo apt-get update && sudo apt-get install -y rsync > /dev/null 2>&1
          mkdir temp_package

          if [ -f "exclude.txt" ]; then
            rsync -av --exclude-from='exclude.txt' ./ temp_package/ 2>&1 | grep -v "^sent\|^total size" || true
          else
            rsync -av --exclude='.git' --exclude='.github' --exclude='temp_package' --exclude='temp_downloads' --exclude='*.zip' --exclude='.backup_*' --exclude='.version_*' ./ temp_package/ 2>&1 | grep -v "^sent\|^total size" || true
          fi

          cd temp_package && zip -r ../${{ steps.version.outputs.version }}.zip . > /dev/null && cd ..
          rm -rf temp_package

          if [ -f "${{ steps.version.outputs.version }}.zip" ]; then
            ZIP_SIZE=$(stat -c%s "${{ steps.version.outputs.version }}.zip")
            ZIP_SIZE_MB=$((ZIP_SIZE / 1024 / 1024))
            echo "✅ ZIP 压缩包已创建: ${{ steps.version.outputs.version }}.zip"
            echo "📦 文件大小: $ZIP_SIZE_MB MB ($ZIP_SIZE bytes)"
          else
            echo "❌ 错误: ZIP 包创建失败"
            exit 1
          fi

      - name: 提交并推送打包更新
        if: steps.should_package.outputs.should_package == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 添加所有修改的文件（包括 .version_code）
          git add module.prop update/update.json update/changelog.md .version_code

          if git diff --staged --quiet; then
            echo "📝 没有需要提交的更改"
          else
            git commit -m "发布: v${{ steps.version.outputs.version }} (版本代码: ${{ steps.version.outputs.versionCode }})"
            git push
            echo "✅ 已推送到远程仓库"
          fi

      - name: 创建 GitHub Release
        if: steps.should_package.outputs.should_package == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.version.outputs.version }}.zip
          name: ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          body: |
            ## 自动发布

            ### 版本信息
            - **版本号**: ${{ steps.version.outputs.version }}
            - **版本代码**: ${{ steps.version.outputs.versionCode }}
            - **发布时间**: ${{ steps.version.outputs.release_datetime }}

            ### 更新内容
            ${{ github.event.inputs.changelog || '同步上游 Releases 更新' }}

            ### 本次更新统计
            - 检测到版本更新的组件: ${{ steps.sync.outputs.updated_count }} 个
            - 实际文件变化的组件: ${{ steps.sync.outputs.actual_updates }} 个

            ### 下载地址
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/${{ steps.version.outputs.version }}.zip
