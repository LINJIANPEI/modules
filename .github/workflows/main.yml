name: 同步上游并打包更新

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
    inputs:
      force_update:
        type: boolean
        default: false
      upstream_name:
        type: string
        default: ""
      skip_backup:
        type: boolean
        default: false
      select_asset:
        type: string
        default: ""
      timezone:
        type: string
        default: "Asia/Shanghai"
      changelog:
        type: string
        default: ""

jobs:
  sync-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip wget rsync tar gzip zip

      - name: 设置时区
        run: |
          sudo timedatectl set-timezone Asia/Shanghai

      - name: 创建目录
        run: |
          mkdir -p bin temp_downloads update

      - name: 校验配置
        run: jq empty sync-mapping-config.json

      # =========================
      # 🧠 version_code（防并发）
      # =========================
      - name: 生成版本号
        id: version
        run: |
          exec 200>.lock
          flock 200

          if [ ! -f .version_code ]; then
            echo 100 > .version_code
          fi

          OLD=$(cat .version_code)
          NEW=$((OLD + 1))
          echo $NEW > .version_code

          flock -u 200

          DATE_VERSION=$(date +'%Y.%m.%d-%H%M%S')
          RELEASE_DATE=$(date +'%Y-%m-%d %H:%M:%S')

          echo "version_code=$NEW" >> $GITHUB_OUTPUT
          echo "version=$DATE_VERSION" >> $GITHUB_OUTPUT
          echo "release_date=$RELEASE_DATE" >> $GITHUB_OUTPUT

      # =========================
      # 🔄 同步上游
      # =========================
      - name: 同步上游
        id: sync
        run: |
          FORCE="${{ github.event.inputs.force_update }}"
          ACTUAL=0

          LEN=$(jq '.upstreams | length' sync-mapping-config.json)

          for ((i=0;i<LEN;i++)); do
            NAME=$(jq -r ".upstreams[$i].name" sync-mapping-config.json)
            REPO=$(jq -r ".upstreams[$i].repo" sync-mapping-config.json)

            DATA=$(curl -s "https://api.github.com/repos/$REPO/releases/latest")
            TAG=$(echo "$DATA" | jq -r '.tag_name')

            FILE=".version_$NAME"

            if [ -f "$FILE" ] && [ "$FORCE" != "true" ]; then
              OLD=$(cat $FILE)
              if [ "$OLD" = "$TAG" ]; then
                continue
              fi
            fi

            echo "$TAG" > "$FILE"

            ASSET_URL=$(echo "$DATA" | jq -r '.assets[0].browser_download_url')
            ASSET_NAME=$(echo "$DATA" | jq -r '.assets[0].name')

            mkdir -p temp_downloads/$NAME
            wget -q -O temp_downloads/$NAME/$ASSET_NAME "$ASSET_URL"

            EXTRACT=temp_downloads/$NAME/extract
            mkdir -p $EXTRACT

            if [[ "$ASSET_NAME" == *.zip ]]; then
              unzip -q temp_downloads/$NAME/$ASSET_NAME -d $EXTRACT
            elif [[ "$ASSET_NAME" == *.tar.gz ]]; then
              tar -xzf temp_downloads/$NAME/$ASSET_NAME -C $EXTRACT
            else
              cp temp_downloads/$NAME/$ASSET_NAME $EXTRACT/
            fi

            SOURCE=$EXTRACT

            MAPPING=$(jq ".upstreams[$i].mappings | length" sync-mapping-config.json)
            FILE_CHANGED=0

            for ((m=0;m<MAPPING;m++)); do
              SRC=$(jq -r ".upstreams[$i].mappings[$m].source" sync-mapping-config.json)
              TGT=$(jq -r ".upstreams[$i].mappings[$m].target" sync-mapping-config.json)
              TYPE=$(jq -r ".upstreams[$i].mappings[$m].type" sync-mapping-config.json)

              if [ "$TYPE" = "file" ]; then
                FILE=$(find "$SOURCE" -name "$SRC" | head -1)

                if [ -f "$FILE" ]; then
                  if [ -f "$TGT" ] && cmp -s "$FILE" "$TGT"; then
                    continue
                  fi

                  mkdir -p "$(dirname "$TGT")"
                  cp "$FILE" "$TGT"
                  FILE_CHANGED=$((FILE_CHANGED+1))
                fi
              fi
            done

            ACTUAL=$((ACTUAL + FILE_CHANGED))
          done

          echo "actual_updates=$ACTUAL" >> $GITHUB_OUTPUT

      # =========================
      # 🧠 是否发布
      # =========================
      - name: 判断是否发布
        id: should
        run: |
          if [ "${{ steps.sync.outputs.actual_updates }}" -gt 0 ]; then
            echo "should=true" >> $GITHUB_OUTPUT
          else
            echo "should=false" >> $GITHUB_OUTPUT
          fi

      # =========================
      # 📦 module.prop
      # =========================
      - name: 更新 module.prop
        if: steps.should.outputs.should == 'true'
        run: |
          sed -i "s/^version=.*/version=${{ steps.version.outputs.version }}/" module.prop
          sed -i "s/^versionCode=.*/versionCode=${{ steps.version.outputs.version_code }}/" module.prop

      # =========================
      # 🧾 update.json
      # =========================
      - name: update.json
        if: steps.should.outputs.should == 'true'
        run: |
          cat > update/update.json <<EOF
{
  "version": "${{ steps.version.outputs.version }}",
  "versionCode": ${{ steps.version.outputs.version_code }},
  "zipUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version_code }}/${{ steps.version.outputs.version }}.zip",
  "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/main/update/changelog.md",
  "releaseDate": "${{ steps.version.outputs.release_date }}"
}
EOF

      # =========================
      # 📦 打包
      # =========================
      - name: 打包模块
        if: steps.should.outputs.should == 'true'
        run: |
          mkdir build
          rsync -av \
            --exclude=".git" \
            --exclude="temp_downloads" \
            --exclude="build" \
            ./ build/

          cd build
          zip -r ../module.zip .

      # =========================
      # 🚀 Release（彻底安全版）
      # =========================
      - name: 发布 Release
        if: steps.should.outputs.should == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version_code }}
          name: v${{ steps.version.outputs.version_code }}
          files: |
            module.zip